site_name: UMTAS Documentation
site_url: https://cos301-se-2026.github.io/UMTAS/
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/LOGOS/VigilOWL-removebg-preview.png
  favicon: assets/LOGOS/VigilOWL-removebg-preview.png
  icon:
    logo: material/owl
  palette:
    scheme: default
    primary: white
    accent: black
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - drawio
  - kroki:
  - swagger-ui-tag
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

markdown_extensions:
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Marking Guide: management/Marking-Guide.md
  - Requirements (SRS):
      - Introduction: requirements/Introduction.md
      - Functional Requirements: requirements/Functional-Requirements.md
      - User Stories & Characteristics: requirements/User-Stories.md
      - Domain Model: requirements/Domain-Model.md
      - Use Cases: requirements/Use-Cases.md
      - Quality Requirements: requirements/Quality-Requirements.md
      - Architectural Requirements: requirements/Architectural-Requirements.md
      - Technology Requirements: requirements/Technology-Requirements.md
      - API Service Contracts: requirements/API-Service-Contracts.md
      - Traceability Matrix: requirements/Traceability-Matrix.md
      - SRS Brief: requirements/SRS-Brief.md
  - Architecture:
      - Overall Architecture: architecture/Overall-Architecture.md
      - Core API: architecture/Core-API.md
      - Scheduling Solver: architecture/Scheduling-Solver.md
      - PDF Parser & Job Queue: architecture/PDF-Parser.md
      - University API Adapter: architecture/University-API-Adapter.md
      - Frontend Component: architecture/Frontend-Component.md
      - Architecture Summary: architecture/Architecture-Summary.md
      - Architecture Brief: architecture/Architecture-Brief.md
  - Design Specifications:
      - Brand Style Guide: design/Brand-Style-Guide.md
      - Wireframes: design/Wireframes.md
      - Design Brief: design/Design-Brief.md
  - Diagrams Repository: diagrams/README.md
  - API Reference: api/API-Reference.md
  - Developer Portal:
      - Overview: developer-guides/index.md
      - Repo Setup: developer-guides/Repo-Setup-Guide.md
      - Git Strategy: developer-guides/git-strategy-guide.md
      - Master Dev Guide: developer-guides/master-development-guide.md
      - Backend Development: developer-guides/backend-development-guide.md
      - Frontend Development: developer-guides/frontend-development-guide.md
      - Server Setup: developer-guides/Server-Setup-Guide.md
      - Server Operations: developer-guides/server-guide.md
      - Unit Testing: developer-guides/unit-testing-guide.md
      - Integration Testing: developer-guides/integration-testing-guide.md
      - Local CI/CD: developer-guides/local-cicd-guide.md
  - Management:
      - Team Profiles: management/Team-Profiles.md
