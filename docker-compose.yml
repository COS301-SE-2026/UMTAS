networks:
  gateway:
    name: gateway
    driver: bridge
  internal:
    name: internal
    internal: true

volumes:
  postgres_data:
  minio_data:
  redis_data:
  grafana_data:
  prometheus_data:
  loki_data:
  letsencrypt_data:

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - gateway
      - internal
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/database/seeds.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - gateway
      - internal
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    restart: unless-stopped
    networks:
      - gateway
      - internal
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    networks:
      - gateway
      - internal
    ports:
      - "1025:1025"
      - "8025:8025"

  solver:
    build:
      context: ./apps/solver
      dockerfile: solver.Dockerfile
    image: ${DOCKER_REGISTRY}:solver-dev
    networks:
      - gateway
      - internal
    profiles:
      - dev-docker
      - dev-infra
      - dev-pglite
      - server

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend/backend.Dockerfile
    image: ${DOCKER_REGISTRY}:backend-dev
    networks:
      - gateway
      - internal
    environment:
      - PORT=${BACKEND_PORT}
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DB_MODE=${DB_MODE}
      - SEED=${SEED}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api.${DOMAIN}
      - BETTER_AUTH_TRUSTED_ORIGINS=https://${DOMAIN}
      - CORS_ORIGIN=https://${DOMAIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SYSTEM_ADMIN_USER_IDS=${SYSTEM_ADMIN_USER_IDS}
    profiles:
      - dev-docker
      - dev-pglite
      - server

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend/frontend.Dockerfile
    image: ${DOCKER_REGISTRY}:frontend-dev
    networks:
      - gateway
    environment:
      - NEXT_PUBLIC_API_URL=https://api.${DOMAIN}
    profiles:
      - dev-docker
      - dev-pglite
      - server

  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    networks:
      - gateway
      - internal
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/home.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    networks:
      - internal
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN}
    volumes:
      - ./infra/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    entrypoint: ["/etc/prometheus/docker-entrypoint.sh"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  loki:
    image: grafana/loki:3.4.3
    restart: unless-stopped
    networks:
      - internal
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki:/etc/loki
      - loki_data:/loki
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  promtail:
    image: grafana/promtail:3.4.3
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - "--docker_only=true"
      - "--store_container_labels=true"
      - "--disable_metrics=advtcp,app,cpu,cpuLoad,diskIO,hugetlb,memory,network,oom_event,percpu,perf_event,process,referenced_memory,resctrl,sched,tcp,udp"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    networks:
      - internal
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    profiles:
      - server
