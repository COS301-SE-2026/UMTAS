name: CI / CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (pnpm)
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: pnpm run lint

      - name: Run Build
        run: pnpm run build

      - name: Run Tests
        run: pnpm run test:unit

  docker-check:
    name: Validate Docker Builds (PR)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/backend.Dockerfile
          push: false
          cache-from: type=gha,scope=backend-pr

      - name: Build frontend (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/frontend.Dockerfile
          push: false
          cache-from: type=gha,scope=frontend-pr

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "suffix=latest" >> $GITHUB_OUTPUT
          else
            echo "suffix=dev" >> $GITHUB_OUTPUT
          fi
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/backend.Dockerfile
          push: true
          tags: |
            vigilcs/umtas:backend-${{ steps.tag.outputs.suffix }}
            vigilcs/umtas:backend-${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/frontend.Dockerfile
          push: true
          tags: |
            vigilcs/umtas:frontend-${{ steps.tag.outputs.suffix }}
            vigilcs/umtas:frontend-${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}

      - name: Build & push solver
        uses: docker/build-push-action@v6
        with:
          context: apps/solver
          file: apps/solver/solver.Dockerfile
          push: true
          tags: |
            vigilcs/umtas:solver-${{ steps.tag.outputs.suffix }}
            vigilcs/umtas:solver-${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=solver-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=solver-${{ github.ref_name }}

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: docker
    if: always() && github.ref_name == 'dev'

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ needs.docker.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Images Pushed — Watchtower deploying"
          else
            COLOR=15158332
            TITLE="❌ Image Push Failed"
          fi

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"Branch\", \"value\": \"dev\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\`\", \"inline\": true },
                  { \"name\": \"Author\", \"value\": \"$ACTOR\", \"inline\": true },
                  { \"name\": \"Message\", \"value\": \"$COMMIT_MSG\" },
                  { \"name\": \"Run\", \"value\": \"[View in GitHub]($RUN_URL)\" }
                ]
              }]
            }" \
            "$DISCORD_WEBHOOK"
