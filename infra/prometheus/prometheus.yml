global:
  scrape_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
  - job_name: "nestjs-backend"
    static_configs:
      - targets: ["backend:8000"]
  - job_name: "python-solver"
    static_configs:
      - targets: ["solver:8000"]
