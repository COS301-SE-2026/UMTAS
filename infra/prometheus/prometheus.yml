global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    project: umtas

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]
        labels:
          service: traefik

  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend
          language: nestjs
    metrics_path: /metrics

  - job_name: solver
    static_configs:
      - targets: ["solver:8000"]
        labels:
          service: solver
          language: python
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: cadvisor
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: compose_service

  - job_name: health-exporter
    static_configs:
      - targets: ["health-exporter:9066"]
        labels:
          service: health-exporter

  - job_name: watchtower
    static_configs:
      - targets: ["watchtower:8080"]
        labels:
          service: watchtower
    metrics_path: /v1/metrics
    authorization:
      credentials_file: /tmp/watchtower_token
